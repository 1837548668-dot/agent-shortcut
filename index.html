<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="description" content="AI星球智能体快捷导航。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI星球" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/ai-planet-192.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/ai-planet-180.png" />
    <link rel="stylesheet" href="./styles.css" />
    <title>AI星球</title>
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <img src="./icons/ai-planet-192.png" alt="" />
          </span>
          <span>AI星球</span>
        </div>
        <button class="icon-button" id="editButton" type="button" aria-label="编辑智能体">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4L16.5 3.5Z" />
          </svg>
        </button>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">MY AI WORKSPACE</p>
          <h1>你的智能体，<br /><span>一触即达。</span></h1>
          <p class="subtitle">把常用的 AI 能力放在一起，少一点寻找，多一点创造。</p>
          <div class="hero-meta">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="agentCount">11 个智能体已就绪</span>
          </div>
          <div class="device-list" aria-label="支持设备">
            <span>电脑</span>
            <span>安卓平板</span>
            <span>iPad</span>
            <span>手机</span>
          </div>
        </div>
        <div class="hero-visual" aria-hidden="true">
          <div class="planet-halo"></div>
          <img src="./icons/ai-planet-original.png" alt="" />
        </div>
      </section>

      <section class="agents-section">
        <div class="section-heading">
          <h2>智能体</h2>
          <span>轻点即可打开</span>
        </div>
        <div class="agent-grid" id="agentGrid" aria-label="智能体列表"></div>
      </section>

      <section class="install-panel" id="installPanel">
        <div class="install-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="6" y="2.5" width="12" height="19" rx="3" />
            <path d="M10 18h4" />
          </svg>
        </div>
        <div class="install-copy">
          <strong id="installTitle">安装 AI星球</strong>
          <span id="installDescription">添加到设备桌面，像 App 一样随时打开</span>
        </div>
        <button class="install-button" id="installButton" type="button">安装</button>
      </section>

      <footer>
        <span>AI星球</span>
        <span>为你的工作流而设计</span>
      </footer>
    </main>

    <dialog class="edit-dialog" id="editDialog">
      <form method="dialog" id="editForm">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="dialog-header">
          <div>
            <p class="eyebrow">CUSTOMIZE</p>
            <h2>管理智能体</h2>
            <p>名称和网址仅保存在当前设备</p>
          </div>
          <button class="close-button" value="cancel" aria-label="关闭" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m7 7 10 10M17 7 7 17" />
            </svg>
          </button>
        </div>

        <div class="edit-list" id="editList"></div>

        <div class="dialog-actions">
          <button class="secondary-button" id="resetButton" type="button">恢复示例</button>
          <button class="primary-button" value="default" type="submit">保存修改</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
